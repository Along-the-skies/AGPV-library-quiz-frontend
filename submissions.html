<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz Submissions (Admin)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-box {
      margin: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
    }
    .btn {
      margin-top: 10px;
      padding: 8px 16px;
      background: #5b3ea6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn:hover {
      background: #472d85;
    }
    .tables-grid {
      margin: 20px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">AGVP Library Quiz</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="submissions.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1>📚 Admin Submissions View</h1>
    <p>Protected leaderboards (requires backend password)</p>
  </section>

  <!-- Admin Login Form -->
  <div id="admin-login" class="login-box">
    <h2>Admin Login</h2>
    <input type="password" id="admin-password" class="input-field" placeholder="Enter Admin Password">
    <button class="btn" onclick="adminLogin()">Login</button>
    <p id="login-error" style="color:red;"></p>
  </div>

  <!-- Hidden Leaderboards -->
  <div id="admin-content" style="display:none;">
    <h2>Leaderboards</h2>
    <div class="tables-grid"></div>
  </div>

  <!-- Footer -->
  <footer>
    <p>AGVP Library Quiz Admin Panel</p>
  </footer>

  <!-- Script -->
  <script>
    async function adminLogin() {
      const password = document.getElementById("admin-password").value;
      const loginError = document.getElementById("login-error");
      const loginBox = document.getElementById("admin-login");
      const adminContent = document.getElementById("admin-content");

      try {
        const response = await fetch(
          "https://agvp-library-backend.onrender.com/submissions?password=" + encodeURIComponent(password)
        );

        if (response.ok) {
          const html = await response.text();   // backend returns HTML
          loginError.textContent = "";
          loginBox.style.display = "none";
          adminContent.style.display = "block";

          // Inject backend HTML directly
          document.querySelector(".tables-grid").innerHTML = html;
        } else if (response.status === 403) {
          loginError.textContent = "Incorrect password.";
        } else {
          loginError.textContent = "Server error (" + response.status + ")";
        }
      } catch (err) {
        loginError.textContent = "Error connecting to server.";
      }
    }
  </script>
</body>
</html>
